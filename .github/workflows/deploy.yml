name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release-windows:
    name: Package Windows Release
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone --depth=1 https://github.com/Microsoft/vcpkg.git
          }
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -Append $env:GITHUB_ENV

      - name: Add LLVM to PATH (pre-installed on windows-2025)
        run: echo "C:\Program Files\LLVM\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Remove Git usr/bin from PATH (prevents Unix link.exe shadowing MSVC linker)
        run: |
          $gitBin = "C:\Program Files\Git\usr\bin"
          $newPath = ($env:PATH -split ';' | Where-Object { $_ -ne $gitBin }) -join ';'
          echo "PATH=$newPath" | Out-File -Append $env:GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch translation layers (Mesa3D)
        run: |
          python third_party/fetch_mesa3d.py --output-dir third_party/mesa3d || echo "Mesa3D fetch skipped"

      - name: Install codegen dependencies
        run: pip install -r gen/requirements.txt

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure (release)
        run: cmake --preset release -DOMNIGPU_FETCH_MESA3D=ON

      - name: Build
        run: cmake --build --preset release

      - name: Package
        shell: pwsh
        run: |
          $pkgDir = "omnigpu-windows-x64"

          # Let CMake install everything (binaries, FFmpeg DLLs, configs, Mesa3D, clvk)
          cmake --install "build/release" --prefix "$pkgDir"

          # Scripts and docs (not part of cmake install)
          New-Item -ItemType Directory -Path "$pkgDir/scripts" -Force
          New-Item -ItemType Directory -Path "$pkgDir/docs" -Force
          Copy-Item "scripts/windows/quick-install.ps1" "$pkgDir/scripts/" -ErrorAction SilentlyContinue
          Copy-Item "scripts/windows/install_guest.ps1"  "$pkgDir/scripts/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue
          Copy-Item "AGENTS.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue

          Compress-Archive -Path "$pkgDir/*" -DestinationPath "omnigpu-windows-x64.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-windows-release
          path: omnigpu-windows-x64.zip

      - name: Upload release asset (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: omnigpu-windows-x64.zip

  release-linux:
    name: Package Linux Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 ninja-build mesa-utils

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone --depth=1 https://github.com/Microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install codegen dependencies
        run: pip install -r gen/requirements.txt

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure (linux)
        run: cmake --preset linux -DOMNIGPU_FETCH_MESA3D=OFF

      - name: Build
        run: cmake --build --preset linux

      - name: Package
        run: |
          pkgDir="omnigpu-linux-x64"

          # Let CMake install everything (binaries, configs, clvk)
          cmake --install build/linux --prefix "$pkgDir"

          # Scripts and docs (not part of cmake install)
          mkdir -p "$pkgDir/scripts" "$pkgDir/docs"
          cp scripts/linux/install_guest.sh "$pkgDir/scripts/" 2>/dev/null || true
          cp scripts/linux/diagnose.sh      "$pkgDir/scripts/" 2>/dev/null || true
          cp README.md "$pkgDir/docs/" 2>/dev/null || true
          cp AGENTS.md "$pkgDir/docs/" 2>/dev/null || true

          tar czf "omnigpu-linux-x64.tar.gz" "$pkgDir/"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-linux-release
          path: omnigpu-linux-x64.tar.gz

      - name: Upload release asset (Linux)
        uses: softprops/action-gh-release@v2
        with:
          files: omnigpu-linux-x64.tar.gz
