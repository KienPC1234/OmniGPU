name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release-windows:
    name: Package Windows Release
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          cache: true

      - name: Install LLVM/Clang
        run: |
          choco install llvm -y --no-progress
          echo "C:\Program Files\LLVM\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch translation layers (Mesa3D)
        run: |
          python third_party/fetch_mesa3d.py --output-dir third_party/mesa3d || echo "Mesa3D fetch skipped"

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure (release)
        run: cmake --preset release -DOMNIGPU_FETCH_MESA3D=ON

      - name: Build
        run: cmake --build --preset release

      - name: Package
        shell: pwsh
        run: |
          $binDir = "build/release/bin"
          $pkgDir = "omnigpu-windows-x64"
          New-Item -ItemType Directory -Path $pkgDir -Force
          New-Item -ItemType Directory -Path "$pkgDir/scripts" -Force
          New-Item -ItemType Directory -Path "$pkgDir/docs" -Force

          # Copy all executable binaries
          $binaries = @(
            "omnigpu_guest.dll",
            "omnigpu_host.exe",
            "omnigpu_guestd.exe",
            "omnigpu_vk_test.exe",
            "vk_icd.json"
          )
          foreach ($bin in $binaries) {
            if (Test-Path "$binDir/$bin") {
              Copy-Item "$binDir/$bin" $pkgDir/
            }
          }

          # Copy scripts
          Copy-Item "scripts/windows/quick-install.ps1" "$pkgDir/scripts/" -ErrorAction SilentlyContinue
          Copy-Item "scripts/windows/install_guest.ps1" "$pkgDir/scripts/" -ErrorAction SilentlyContinue

          # Copy configs & docs
          Copy-Item "omnigpu_guest.json" $pkgDir/ -ErrorAction SilentlyContinue
          Copy-Item "README.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue
          Copy-Item "AGENTS.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue

          # Translation layers (if fetched)
          if (Test-Path "third_party/zink/opengl32.dll") {
            Copy-Item "third_party/zink/opengl32.dll" $pkgDir/
          }
          if (Test-Path "third_party/clvk/OpenCL.dll") {
            Copy-Item "third_party/clvk/OpenCL.dll" $pkgDir/
          }

          # Runtime dependencies
          Get-ChildItem "$binDir/*.dll" | ForEach-Object {
            if (-not (Test-Path "$pkgDir/$($_.Name)")) {
              Copy-Item $_.FullName $pkgDir/
            }
          }

          Compress-Archive -Path "$pkgDir/*" -DestinationPath "omnigpu-windows-x64.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-windows-release
          path: omnigpu-windows-x64.zip

      - name: Upload release asset (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: omnigpu-windows-x64.zip

  release-linux:
    name: Package Linux Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 ninja-build mesa-utils

      - name: Setup vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure (linux)
        run: cmake --preset linux -DOMNIGPU_FETCH_MESA3D=OFF

      - name: Build
        run: cmake --build --preset linux

      - name: Package
        run: |
          pkgDir="omnigpu-linux-x64"
          mkdir -p "$pkgDir"
          mkdir -p "$pkgDir/scripts"
          mkdir -p "$pkgDir/docs"

          # Core binaries
          cp build/linux/bin/omnigpu_guest.so "$pkgDir/" 2>/dev/null || true
          cp build/linux/bin/omnigpu_host       "$pkgDir/" 2>/dev/null || true
          cp build/linux/bin/omnigpu_guestd      "$pkgDir/" 2>/dev/null || true
          cp build/linux/bin/omnigpu_guest_test  "$pkgDir/" 2>/dev/null || true
          cp build/linux/bin/omnigpu_vk_test    "$pkgDir/" 2>/dev/null || true
          cp src/guest/vk_icd.json "$pkgDir/"

          # Scripts and configs
          cp scripts/linux/install_guest.sh "$pkgDir/scripts/" 2>/dev/null || true
          cp scripts/linux/diagnose.sh "$pkgDir/scripts/" 2>/dev/null || true
          cp omnigpu_guest.json "$pkgDir/" 2>/dev/null || true

          # Docs
          cp README.md "$pkgDir/docs/" 2>/dev/null || true
          cp AGENTS.md "$pkgDir/docs/" 2>/dev/null || true

          # Translation layers & libraries
          cp third_party/clvk/*.so* "$pkgDir/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libGL.so* "$pkgDir/" 2>/dev/null || true

          tar czf "omnigpu-linux-x64.tar.gz" "$pkgDir/"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-linux-release
          path: omnigpu-linux-x64.tar.gz

      - name: Upload release asset (Linux)
        uses: softprops/action-gh-release@v2
        with:
          files: omnigpu-linux-x64.tar.gz
