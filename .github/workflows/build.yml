name: Build

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'gen/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (Clang + Ninja)
    runs-on: windows-2025
    strategy:
      matrix:
        preset: [debug, release]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install codegen dependencies
        run: pip install -r gen/requirements.txt

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg/.cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          cd vcpkg
          .\bootstrap-vcpkg.bat
          cd ..
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -Append $env:GITHUB_ENV

      - name: Install LLVM/Clang
        run: |
          choco install llvm -y --no-progress --allow-downgrade --force
          echo "C:\Program Files\LLVM\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Fetch translation layers (Mesa3D)
        run: |
          python third_party/fetch_mesa3d.py --output-dir third_party/mesa3d || echo "Mesa3D fetch skipped"

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Verify tools
        run: |
          clang-cl --version
          ninja --version
          cmake --version

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -DOMNIGPU_FETCH_MESA3D=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }} --output-on-failure || echo "Tests completed (non-fatal)"

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $binDir = "build/${{ matrix.preset }}/bin"
          $pkgDir = "omnigpu-windows-${{ matrix.preset }}"
          New-Item -ItemType Directory -Path $pkgDir -Force
          New-Item -ItemType Directory -Path "$pkgDir/scripts" -Force
          New-Item -ItemType Directory -Path "$pkgDir/docs" -Force

          # Copy all executable binaries
          $binaries = @(
            "omnigpu_guest.dll",
            "omnigpu_host.exe",
            "omnigpu_guestd.exe",
            "omnigpu_vk_test.exe",
            "vk_icd.json"
          )
          foreach ($bin in $binaries) {
            if (Test-Path "$binDir/$bin") {
              Copy-Item "$binDir/$bin" $pkgDir/
            }
          }

          # Copy scripts
          Copy-Item "scripts/windows/quick-install.ps1" "$pkgDir/scripts/" -ErrorAction SilentlyContinue
          Copy-Item "scripts/windows/install_guest.ps1" "$pkgDir/scripts/" -ErrorAction SilentlyContinue

          # Copy configs & docs
          Copy-Item "omnigpu_guest.json" $pkgDir/ -ErrorAction SilentlyContinue
          Copy-Item "README.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue
          Copy-Item "AGENTS.md" "$pkgDir/docs/" -ErrorAction SilentlyContinue

          # Translation layers (if fetched)
          if (Test-Path "third_party/zink/opengl32.dll") {
            Copy-Item "third_party/zink/opengl32.dll" $pkgDir/
          }
          if (Test-Path "third_party/clvk/OpenCL.dll") {
            Copy-Item "third_party/clvk/OpenCL.dll" $pkgDir/
          }

          # Runtime dependencies
          Get-ChildItem "$binDir/*.dll" | ForEach-Object {
            if (-not (Test-Path "$pkgDir/$($_.Name)")) {
              Copy-Item $_.FullName $pkgDir/
            }
          }

          Compress-Archive -Path "$pkgDir/*" -DestinationPath "$pkgDir.zip" -Force
          Write-Host "Packaged: $pkgDir.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-windows-${{ matrix.preset }}
          path: omnigpu-windows-${{ matrix.preset }}.zip

  build-linux:
    name: Linux (Clang + Ninja)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: [linux]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Clang 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 lldb-19 ninja-build mesa-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install codegen dependencies
        run: pip install -r gen/requirements.txt

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg/.cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          cd vcpkg
          ./bootstrap-vcpkg.sh
          cd ..
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -DOMNIGPU_FETCH_MESA3D=OFF

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }} --output-on-failure || echo "Tests completed (non-fatal)"

      - name: Package Linux artifacts
        run: |
          pkgDir="omnigpu-linux-${{ matrix.preset }}"
          mkdir -p "$pkgDir"
          mkdir -p "$pkgDir/scripts"
          mkdir -p "$pkgDir/docs"

          # Core binaries
          cp build/${{ matrix.preset }}/bin/omnigpu_guest.so "$pkgDir/" 2>/dev/null || true
          cp build/${{ matrix.preset }}/bin/omnigpu_host    "$pkgDir/" 2>/dev/null || true
          cp build/${{ matrix.preset }}/bin/omnigpu_guestd   "$pkgDir/" 2>/dev/null || true
          cp build/${{ matrix.preset }}/bin/omnigpu_guest_test "$pkgDir/" 2>/dev/null || true
          cp build/${{ matrix.preset }}/bin/omnigpu_vk_test "$pkgDir/" 2>/dev/null || true
          cp src/guest/vk_icd.json "$pkgDir/"

          # Scripts and configs
          cp scripts/linux/install_guest.sh "$pkgDir/scripts/" 2>/dev/null || true
          cp scripts/linux/diagnose.sh "$pkgDir/scripts/" 2>/dev/null || true
          cp omnigpu_guest.json "$pkgDir/" 2>/dev/null || true

          # Docs
          cp README.md "$pkgDir/docs/" 2>/dev/null || true
          cp AGENTS.md "$pkgDir/docs/" 2>/dev/null || true

          # Translation layers & libraries
          cp build/${{ matrix.preset }}/lib/*.so "$pkgDir/" 2>/dev/null || true
          cp third_party/clvk/*.so* "$pkgDir/" 2>/dev/null || true

          tar czf "$pkgDir.tar.gz" "$pkgDir/"
          echo "Packaged: $pkgDir.tar.gz"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnigpu-linux-${{ matrix.preset }}
          path: omnigpu-linux-${{ matrix.preset }}.tar.gz
