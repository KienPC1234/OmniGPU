name: Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-windows:
    name: Windows (Clang + Ninja)
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone --depth=1 https://github.com/Microsoft/vcpkg.git
          }
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -Append $env:GITHUB_ENV

      - name: Install LLVM/Clang
        run: |
          choco install llvm -y --no-progress --allow-downgrade --force
          echo "C:\Program Files\LLVM\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Remove Git usr/bin from PATH (prevents Unix link.exe shadowing MSVC linker)
        run: |
          $gitBin = "C:\Program Files\Git\usr\bin"
          $newPath = ($env:PATH -split ';' | Where-Object { $_ -ne $gitBin }) -join ';'
          echo "PATH=$newPath" | Out-File -Append $env:GITHUB_ENV

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch translation layers
        run: |
          python third_party/fetch_zink.py --output-dir third_party/zink || true
          python third_party/fetch_clvk.py --output-dir third_party/clvk || true

      - name: Install codegen dependencies
        run: pip install -r gen/requirements.txt

      - name: Generate intercept stubs
        run: python gen/generate.py --manifest gen/vulkan_api.json --output src/guest/vk_intercept_gen.cpp

      - name: Configure CMake (debug)
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - name: Run tests
        run: ctest --preset debug --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows
          path: build/debug/Testing/

  test-linux:
    name: Linux (Clang + Ninja)
    if: false  # temporarily disabled
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Clang 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 lldb-19 ninja-build

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone --depth=1 https://github.com/Microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch translation layers
        run: |
          python third_party/fetch_clvk.py --output-dir third_party/clvk || true

      - name: Configure CMake (linux)
        run: cmake --preset linux

      - name: Build
        run: cmake --build --preset linux

      - name: Run tests
        run: ctest --preset linux --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-linux
          path: build/linux/Testing/

  codegen:
    name: Code Generator
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r gen/requirements.txt

      - name: Test code generator
        run: |
          python gen/generate.py --manifest gen/vulkan_api.json --output /tmp/vk_intercept_test.cpp
          python gen/generate.py --manifest gen/vulkan_api.json --list

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-intercept
          path: /tmp/vk_intercept_test.cpp

  lint:
    name: Lint (clang-tidy)
    if: false  # temporarily disabled
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Clang 19 + tools
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 clang-tidy-19 ninja-build

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone --depth=1 https://github.com/Microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset linux -DCMAKE_CXX_CLANG_TIDY=clang-tidy-19

      - name: Build with linter
        run: cmake --build --preset linux 2>&1 | head -100
